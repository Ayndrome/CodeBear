apiVersion: apps/v1
kind: Deployment
metadata:
  name: codedolphin-web
  namespace: codedolphin
  labels:
    app: codedolphin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codedolphin
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: codedolphin
    spec:
      containers:
        - name: web
          image: codedolphinlatest_v7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:  
            - configMapRef:
                name: codedolphin-config
            - secretRef:
                name: codedolphin-secrets
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      terminationGracePeriodSeconds: 30
